services:
  postgres:
    image: postgres:15
    container_name: iot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    ports:
      - "${MQTT_PORT}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  shelly-ingestor:
    build:
      context: ./shelly-ingestor
    container_name: shelly_ingestor
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_INTERNAL_PORT: ${MQTT_INTERNAL_PORT}
      SHELLY_TOPIC: ${SHELLY_TOPIC}
    depends_on:
      - postgres
      - mosquitto

  ttn-ingestor:
    build:
      context: ./ttn-ingestor
    container_name: ttn_ingestor
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TTN_MQTT_HOST: ${TTN_MQTT_HOST}
      TTN_MQTT_PORT: ${TTN_MQTT_PORT}
      TTN_USERNAME: ${TTN_USERNAME}
      TTN_PASSWORD: ${TTN_PASSWORD}
      TTN_TOPIC: ${TTN_TOPIC}
    depends_on:
      - postgres

  api:
    build:
      context: ./api
    container_name: iot_api
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - postgres

volumes:
  postgres_data: